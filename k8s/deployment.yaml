apiVersion: apps/v1
kind: Deployment
metadata:
  name: billy-voice
  namespace: agent-sandbox
  labels:
    app: billy-voice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billy-voice
  template:
    metadata:
      labels:
        app: billy-voice
    spec:
      containers:
        - name: billy-voice
          image: goydmitriy/billy-voice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          envFrom:
            - configMapRef:
                name: billy-voice-config
            - secretRef:
                name: billy-voice-secret
          volumeMounts:
            - name: whisper-cache
              mountPath: /root/.cache/huggingface
            - name: openclaw-data
              mountPath: /data/.openclaw
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: whisper-cache
          persistentVolumeClaim:
            claimName: whisper-cache
        - name: openclaw-data
          hostPath:
            path: /data/.openclaw
            type: Directory
