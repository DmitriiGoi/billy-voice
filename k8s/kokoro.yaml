---
# Kokoro TTS — локальный TTS сервер (OpenAI-совместимый API)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokoro-tts
  namespace: agent-sandbox
  labels:
    app: kokoro-tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kokoro-tts
  template:
    metadata:
      labels:
        app: kokoro-tts
    spec:
      containers:
        - name: kokoro-tts
          image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8880
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          volumeMounts:
            - name: kokoro-models
              mountPath: /app/models
          readinessProbe:
            httpGet:
              path: /health
              port: 8880
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8880
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: kokoro-models
          persistentVolumeClaim:
            claimName: kokoro-models
---
apiVersion: v1
kind: Service
metadata:
  name: kokoro-tts
  namespace: agent-sandbox
spec:
  selector:
    app: kokoro-tts
  ports:
    - port: 8880
      targetPort: 8880
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kokoro-models
  namespace: agent-sandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
