apiVersion: v1
kind: Secret
metadata:
  name: billy-voice-secret
  namespace: agent-sandbox
type: Opaque
stringData:
  # Gateway token so openclaw CLI can auth to the local gateway
  OPENCLAW_GATEWAY_TOKEN: "REPLACE_WITH_ACTUAL_TOKEN"
  OPENCLAW_GATEWAY_URL: "http://openclaw.personal-agent.svc.cluster.local:18789"
